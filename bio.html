<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYNAR - Official Bio / Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-neon-blue: #0066ff;
            --pure-orange: #ff7b00;
            --background: #060606;
            --frosted-bg: rgba(18, 18, 18, 0.65);
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
            background-color: var(--background);
        }

        /* Fondo desenfocado dinámico con la foto de perfil */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('perfil.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(25%) saturate(150%);
            transform: scale(1.1);
            z-index: -1;
        }

        /* Contenedor principal estilo frosted glass original */
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
            background: var(--frosted-bg);
            padding: 35px 25px 25px 25px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Borde del Avatar: Fusión Azul y Fuego */
        .avatar-wrapper {
            position: relative;
            width: 115px;
            height: 115px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--deep-neon-blue) 0%, #00d2ff 50%, var(--pure-orange) 100%);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* NUEVO AVATAR: SOLUCIÓN SIN BORDES AZULES RAROS */
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #121212;
            box-sizing: border-box;
            background-image: url('perfil.jpg');
            background-repeat: no-repeat;
            background-size: 170%; 
            background-position: 98% 35%; 
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 6px 0;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* TEXTO EN COLOR NEGRO SOLICITADO */
        h2 {
            font-size: 14px;
            color: #000000; 
            margin: 0 0 30px 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Enlaces / Botones de plataformas */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 18px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .btn-link:hover {
            background-color: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
        }
