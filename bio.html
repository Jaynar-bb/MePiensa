<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaynar - Enlaces Oficiales / Bio</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
            background-color: #0c0c0c;
        }

        /* Fondo desenfocado dinámico con la foto de perfil */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('perfil.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(30%);
            transform: scale(1.1);
            z-index: -1;
        }

        /* Contenedor principal estilo vidrio esmerilado (frosted glass) */
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
            background: rgba(18, 18, 18, 0.65);
            padding: 35px 25px 25px 25px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Avatar del artista */
        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #ff0044 0%, #007aff 100%);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.2);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #121212;
            display: block;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 6px 0;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 14px;
            color: #b3b3b3;
            margin: 0 0 30px 0;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Enlaces / Botones de plataformas */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 18px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .btn-link:hover {
            background-color: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .btn-link:active {
            transform: translateY(0);
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
        }

        .platform-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .platform-action {
            font-size: 11px;
            color: #a7a7a7;
            font-weight: 400;
            margin-top: 2px;
        }

        .arrow {
            font-size: 13px;
            color: #8e8e93;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .btn-link:hover .arrow {
            transform: translateX(4px);
            color: #ffffff;
        }

        /* Destacado: Sencillo "Me Piensa" */
        .btn-featured {
            background: linear-gradient(135deg, rgba(255, 0, 68, 0.15) 0%, rgba(0, 122, 255, 0.15) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: pulseGlow 3s infinite ease-in-out;
        }
        
        .btn-featured:hover {
            background: linear-gradient(135deg, rgba(255, 0, 68, 0.25) 0%, rgba(0, 122, 255, 0.25) 100%);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.25);
        }

        .btn-featured .btn-icon {
            color: #ffffff;
        }

        .badge-new {
            font-size: 9px;
            background: linear-gradient(135deg, #ff0044 0%, #007aff 100%);
            padding: 3px 7px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(255, 0, 68, 0.05), 0 0 15px rgba(0, 122, 255, 0.05);
            }
            50% {
                box-shadow: 0 0 25px rgba(255, 0, 68, 0.15), 0 0 25px rgba(0, 122, 255, 0.15);
            }
        }

        /* Diseños de Bordes y Colores de cada Plataforma */
        .btn-spotify {
            border-left: 4px solid #1DB954;
        }
        .btn-spotify:hover {
            box-shadow: 0 8px 24px rgba(29, 185, 84, 0.12);
        }
        .btn-spotify .btn-icon {
            color: #1DB954;
        }

        .btn-apple {
            border-left: 4px solid #fc3c44;
        }
        .btn-apple:hover {
            box-shadow: 0 8px 24px rgba(252, 60, 68, 0.12);
        }
        .btn-apple .btn-icon {
            color: #fc3c44;
        }

        .btn-youtube {
            border-left: 4px solid #ff0000;
        }
        .btn-youtube:hover {
            box-shadow: 0 8px 24px rgba(255, 0, 0, 0.12);
        }
        .btn-youtube .btn-icon {
            color: #ff0000;
        }

        .footer {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 30px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Avatar del artista -->
        <div class="avatar-wrapper">
            <img src="perfil.jpg" alt="Jaynar Perfil" class="avatar">
        </div>

            <!-- YOUTUBE CHANNEL -->

                    <div class="btn-icon">
                        <!-- YouTube SVG Logo -->
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.517 3.545 12 3.545 12 3.545s-7.517 0-9.388.508a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.871.508 9.388.508 9.388.508s7.517 0 9.388-.508a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>

        </div>

        <div class="footer">
            © 2026 JAYNAR. Todos los derechos reservados.
        </div>
    </div>

</body>
</html>
